<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verification Successful</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    width:800px;
    padding:80px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.icon{
    font-size:100px;
    color:green;
    margin-bottom:20px;
}

h1{
    font-size:60px;
    color:green;
    margin-bottom:20px;
}

p{
    font-size:28px;
    color:#444;
    margin-bottom:40px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:20px 50px;
    font-size:24px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

</style>
</head>

<body>

<div class="box">

    <div class="icon">✓</div>

    <h1>Success!</h1>

    <p>
        Verification completed successfully.
    </p>

    <button onclick="window.location.href='index.html'">
        Back
    </button>

</div>

</body>
</html>
