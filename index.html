<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account Security Alert</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f1f1f1;
    font-family:Arial, sans-serif;
}

.box{
    width:850px;
    background:white;
    margin:40px auto;
    padding:50px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.red-text{
    color:red;
    font-size:28px;
    font-weight:bold;
    margin-bottom:35px;
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:35px;
}

.text{
    font-size:22px;
    margin-bottom:25px;
    line-height:1.5;
}

button{
    padding:14px 30px;
    font-size:18px;
    background:#f5f5f5;
    border:1px solid #999;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#e5e5e5;
}

</style>
</head>

<body>

<div class="box">

    <div class="red-text">
        Please verify your account
    </div>

    <div class="title">
        Account Security Alert
    </div>

    <div class="text">
        Your account was accessed from an unusual device.
    </div>

    <div class="text">
        Please verify your identity to make sure that your account is safe.
    </div>

    <button>
        Verify Identity
    </button>

</div>

</body>
</html>
