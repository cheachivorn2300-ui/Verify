<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Please verify your account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    width:90%;
    max-width:900px;
    padding:50px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.badge{
    color:#dc3545;
    font-size:24px;
    font-weight:bold;
    margin-bottom:25px;
}

.title{
    font-size:48px;
    font-weight:bold;
    color:#222;
    margin-bottom:30px;
}

.text{
    font-size:22px;
    color:#444;
    line-height:1.7;
    margin-bottom:20px;
}

.warning-box{
    background:#fff3cd;
    border-left:6px solid #ffc107;
    padding:20px;
    margin:30px 0;
    border-radius:8px;
    font-size:20px;
    color:#664d03;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:16px 40px;
    font-size:20px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0b5ed7;
    transform:translateY(-2px);
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}

@media(max-width:768px){

    .box{
        padding:30px;
    }

    .title{
        font-size:34px;
    }

    .text{
        font-size:18px;
    }

    button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="box">

    <div class="badge">
        Please verify your account
    </div>

    <div class="title">
        Account Security Alert
    </div>

    <div class="text">
        Your account was accessed from an unusual device.
    </div>

    <div class="text">
        To make sure that your account is safe please verify your identity .
    </div>

    <div class="warning-box">
        ⚠ Warning: Unverified accounts will be terminated within 24 hour.
    </div>

    <button onclick="window.location.href='success.html'">
        Verify your Identity
    </button>

</div>

</body>
</html>
